<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Módulo de Criptoanálise - Agência Sombra</title>
    <style>
        :root {
            --bg-deep: #08080a;
            --panel-bg: #101115;
            --amber-glow: #ff9900;
            --amber-dim: #663d00;
            --text-light: #e0e0e6;
            --border-color: #22252e;
            --font-terminal: 'Courier New', Courier, monospace;
        }

        body {
            background-color: var(--bg-deep);
            color: var(--text-light);
            font-family: var(--font-terminal);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            background-image: linear-gradient(rgba(16, 17, 21, 0.3) 50%, rgba(0, 0, 0, 0.5) 50%);
            background-size: 100% 4px;
        }

        .header {
            text-align: center;
            margin-bottom: 25px;
            width: 100%;
            max-width: 1000px;
            border-bottom: 1px double var(--border-color);
            padding-bottom: 15px;
        }

        h1 {
            font-size: 1.4em;
            text-transform: uppercase;
            letter-spacing: 5px;
            color: #ffffff;
            margin: 0;
            text-shadow: 0 0 8px rgba(255, 153, 0, 0.5);
        }

        .workspace {
            width: 100%;
            max-width: 1000px;
            display: grid;
            grid-template-columns: 420px 1fr;
            gap: 25px;
        }

        @media (max-width: 850px) {
            .workspace { grid-template-columns: 1fr; }
        }

        .panel {
            background-color: var(--panel-bg);
            border: 1px solid var(--border-color);
            padding: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.8);
            display: flex;
            flex-direction: column;
        }

        h2 {
            font-size: 0.9em;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-top: 0;
            margin-bottom: 15px;
            color: var(--amber-glow);
            border-left: 3px solid var(--amber-glow);
            padding-left: 8px;
        }

        /* --- CALCULADORA --- */
        .calc-screen {
            width: 100%;
            background-color: #000000;
            border: 1px solid var(--border-color);
            color: var(--amber-glow);
            font-family: var(--font-terminal);
            font-size: 1.4em;
            padding: 12px;
            box-sizing: border-box;
            text-align: right;
            margin-bottom: 15px;
            letter-spacing: 1px;
            text-shadow: 0 0 5px var(--amber-dim);
        }

        .mode-toggle {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        .mode-btn {
            flex: 1;
            background: #050507;
            border: 1px solid var(--border-color);
            color: var(--text-light);
            padding: 6px;
            font-family: var(--font-terminal);
            cursor: pointer;
            font-size: 0.75em;
            text-transform: uppercase;
        }

        .mode-btn.active {
            border-color: var(--amber-glow);
            color: var(--amber-glow);
            background: rgba(255, 153, 0, 0.05);
        }

        .calc-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
        }

        .calc-grid.scientific-active {
            grid-template-columns: repeat(5, 1fr);
        }

        .btn {
            background-color: #14161d;
            border: 1px solid var(--border-color);
            color: var(--text-light);
            padding: 14px 10px;
            font-family: var(--font-terminal);
            font-size: 0.95em;
            cursor: pointer;
            transition: all 0.2s;
            user-select: none;
        }

        .btn:hover {
            background-color: #222530;
            border-color: #444;
        }

        .btn.op { color: var(--amber-glow); }
        .btn.fn { color: #61afef; font-size: 0.8em; }
        .btn.clear { color: #e06c75; }
        
        .btn.equal {
            background-color: var(--amber-dim);
            border-color: var(--amber-glow);
            color: #ffffff;
        }
        .btn.equal:hover {
            background-color: var(--amber-glow);
            color: #000000;
        }

        .hidden { display: none !important; }

        /* --- PLOTADOR --- */
        .plotter-controls {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        .function-input {
            flex: 1;
            background-color: #000;
            border: 1px solid var(--border-color);
            color: #fff;
            padding: 10px;
            font-family: var(--font-terminal);
        }

        .function-input:focus {
            outline: none;
            border-color: var(--amber-glow);
        }

        .btn-plot {
            background: transparent;
            color: var(--amber-glow);
            border: 1px solid var(--amber-glow);
            padding: 10px 20px;
            cursor: pointer;
            font-family: var(--font-terminal);
            text-transform: uppercase;
            font-weight: bold;
        }

        .btn-plot:hover {
            background: var(--amber-glow);
            color: #000;
        }

        .canvas-container {
            background-color: #000000;
            border: 1px solid var(--border-color);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 10px;
            position: relative;
        }

        canvas {
            max-width: 100%;
            height: auto;
            background-color: #020203;
        }

        .presets {
            margin-top: 10px;
            display: flex;
            gap: 5px;
            flex-wrap: wrap;
        }

        .preset-link {
            font-size: 0.75em;
            color: #61afef;
            cursor: pointer;
            text-decoration: underline;
            background: none;
            border: none;
            padding: 0;
            font-family: var(--font-terminal);
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>Análise de Campo // Modelo Terminal-9</h1>
    </div>

    <div class="workspace">
        
        <div class="panel">
            <h2>I. Computador de Matriz</h2>
            <input type="text" id="screen" class="calc-screen" value="0" readonly>
            
            <div class="mode-toggle">
                <button id="mode-std" class="mode-btn active" onclick="setCalcMode('std')">Padrão</button>
                <button id="mode-sci" class="mode-btn" onclick="setCalcMode('sci')">Científica</button>
            </div>

            <div id="calc-buttons" class="calc-grid">
                <button class="btn fn sci-field hidden" onclick="inputFn('sin')">sin</button>
                <button class="btn fn sci-field hidden" onclick="inputFn('cos')">cos</button>
                <button class="btn fn sci-field hidden" onclick="inputFn('tan')">tan</button>
                <button class="btn fn sci-field hidden" onclick="inputFn('log')">log</button>
                <button class="btn fn sci-field hidden" onclick="inputOp('**')">^</button>

                <button class="btn fn sci-field hidden" onclick="inputConst('Math.PI')">π</button>
                <button class="btn fn sci-field hidden" onclick="inputConst('Math.E')">e</button>
                <button class="btn fn sci-field hidden" onclick="inputFn('sqrt')">√</button>
                <button class="btn fn sci-field hidden" onclick="input('(')">(</button>
                <button class="btn fn sci-field hidden" onclick="input(')')">)</button>

                <button class="btn clear" onclick="clearScreen()">C</button>
                <button class="btn op" onclick="backspace()">←</button>
                <button class="btn op" onclick="inputOp('%')">%</button>
                <button class="btn op" onclick="inputOp('/')">/</button>

                <button class="btn" onclick="input('7')">7</button>
                <button class="btn" onclick="input('8')">8</button>
                <button class="btn" onclick="input('9')">9</button>
                <button class="btn op" onclick="inputOp('*')">×</button>

                <button class="btn" onclick="input('4')">4</button>
                <button class="btn" onclick="input('5')">5</button>
                <button class="btn" onclick="input('6')">6</button>
                <button class="btn op" onclick="inputOp('-')">-</button>

                <button class="btn" onclick="input('1')">1</button>
                <button class="btn" onclick="input('2')">2</button>
                <button class="btn" onclick="input('3')">3</button>
                <button class="btn op" onclick="inputOp('+')">+</button>

                <button class="btn" onclick="input('0')">0</button>
                <button class="btn" onclick="input('00')">00</button>
                <button class="btn" onclick="input('.')">.</button>
                <button class="btn equal" onclick="calculate()">=</button>
            </div>
        </div>

        <div class="panel">
            <h2>II. Traçado Vetorial & Curvas Balísticas</h2>
            <div class="plotter-controls">
                <input type="text" id="func-input" class="function-input" value="sin(x)">
                <button class="btn-plot" onclick="plotGraph()">Traçar</button>
            </div>
            
            <div class="canvas-container">
                <canvas id="graphCanvas" width="500" height="400"></canvas>
            </div>
            
            <div class="presets">
                <span style="font-size:0.75em; color:var(--text-dim)">Predefinições:</span>
                <button class="preset-link" onclick="setPreset('x * x')">x²</button>
                <button class="preset-link" onclick="setPreset('sin(x) * 2')">2·sin(x)</button>
                <button class="preset-link" onclick="setPreset('cos(x)')">cos(x)</button>
                <button class="preset-link" onclick="setPreset('Math.sqrt(x)')">√x</button>
            </div>
        </div>

    </div>

    <script>
        let currentInput = "0";
        let isEvaluated = false;

        const screenEl = document.getElementById('screen');
        const gridEl = document.getElementById('calc-buttons');
        const canvas = document.getElementById('graphCanvas');
        const ctx = canvas.getContext('2d');

        // --- SISTEMA DA CALCULADORA ---
        function setCalcMode(mode) {
            const sciFields = document.querySelectorAll('.sci-field');
            if (mode === 'sci') {
                document.getElementById('mode-sci').classList.add('active');
                document.getElementById('mode-std').classList.remove('active');
                gridEl.classList.add('scientific-active');
                sciFields.forEach(f => f.classList.remove('hidden'));
            } else {
                document.getElementById('mode-std').classList.add('active');
                document.getElementById('mode-sci').classList.remove('active');
                gridEl.classList.remove('scientific-active');
                sciFields.forEach(f => f.classList.add('hidden'));
            }
        }

        function input(val) {
            if (currentInput === "0" || isEvaluated) {
                currentInput = val;
                isEvaluated = false;
            } else {
                currentInput += val;
            }
            updateScreen();
        }

        function inputOp(op) {
            isEvaluated = false;
            // Evita duplicar operadores seguidos de forma crua
            if (["+", "-", "*", "/", "%", "**"].includes(currentInput.slice(-1))) return;
            currentInput += op;
            updateScreen();
        }

        function inputFn(fn) {
            if (currentInput === "0" || isEvaluated) {
                currentInput = `Math.${fn}(`;
                isEvaluated = false;
            } else {
                currentInput += `Math.${fn}(`;
            }
            updateScreen();
        }

        function inputConst(constant) {
            if (currentInput === "0" || isEvaluated) {
                currentInput = constant;
                isEvaluated = false;
            } else {
                currentInput += constant;
            }
            updateScreen();
        }

        function clearScreen() {
            currentInput = "0";
            updateScreen();
        }

        function backspace() {
            if (currentInput.length > 1) {
                currentInput = currentInput.slice(0, -1);
            } else {
                currentInput = "0";
            }
            updateScreen();
        }

        function updateScreen() {
            // Torna a exibição visual amigável mascarando as chamadas internas do objeto Math
            let display = currentInput
                .replace(/Math\./g, '')
                .replace(/\*\*/g, '^')
                .replace(/\*/g, '×');
            screenEl.value = display;
        }

        function calculate() {
            try {
                // Força o fechamento de parênteses automáticos se o agente esquecer
                let openParentheses = (currentInput.match(/\(/g) || []).length;
                let closeParentheses = (currentInput.match(/\)/g) || []).length;
                while (openParentheses > closeParentheses) {
                    currentInput += ')';
                    closeParentheses++;
                }

                // Avaliação da expressão usando construtor estrito e isolado
                let result = new Function(`return ${currentInput}`)();
                
                if (result === undefined || isNaN(result)) throw new Error();
                
                // Formata decimais longos para não quebrar a tela
                if (result % 1 !== 0) result = parseFloat(result.toFixed(6));

                currentInput = String(result);
                isEvaluated = true;
                updateScreen();
            } catch (e) {
                screenEl.value = "ERRO SINTAXE";
                currentInput = "0";
                isEvaluated = true;
            }
        }

        // --- SISTEMA DO PLOTADOR DE GRÁFICOS (CANVAS) ---
        function setPreset(expr) {
            document.getElementById('func-input').value = expr;
            plotGraph();
        }

        function plotGraph() {
            const inputExpr = document.getElementById('func-input').value;
            
            // Limpa o canvas com fundo escuro absoluto
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#020203";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            const width = canvas.width;
            const height = canvas.height;
            
            // Definição do centro da tela (Origem Cartesiana 0,0)
            const centerX = width / 2;
            const centerY = height / 2;
            
            // Fator de escala: Quantos pixels equivalem a 1 unidade matemática
            const scale = 35; 

            // 1. Desenhar a Malha Quadriculada de Fundo (Grid tático)
            ctx.strokeStyle = "#10141a";
            ctx.lineWidth = 1;
            
            // Linhas verticais
            for (let x = 0; x < width; x += scale) {
                ctx.beginPath();
                ctx.moveTo(x, 0);
                ctx.lineTo(x, height);
                ctx.stroke();
            }
            // Linhas horizontais
            for (let y = 0; y < height; y += scale) {
                ctx.beginPath();
                ctx.moveTo(0, y);
                ctx.lineTo(width, y);
                ctx.stroke();
            }

            // 2. Desenhar Eixos Principais X e Y
            ctx.strokeStyle = "#333d4a";
            ctx.lineWidth = 2;
            
            // Eixo X
            ctx.beginPath();
            ctx.moveTo(0, centerY);
            ctx.lineTo(width, centerY);
            ctx.stroke();
            
            // Eixo Y
            ctx.beginPath();
            ctx.moveTo(centerX, 0);
            ctx.lineTo(centerX, height);
            ctx.stroke();

            // 3. Traduzir e Normalizar a string da função fornecida pelo usuário
            // Substitui termos comuns para que a engine JS entenda as diretivas matematicas
            let safeExpr = inputExpr
                .replace(/sin/g, 'Math.sin')
                .replace(/cos/g, 'Math.cos')
                .replace(/tan/g, 'Math.tan')
                .replace(/log/g, 'Math.log')
                .replace(/exp/g, 'Math.exp')
                .replace(/pi/g, 'Math.PI')
                .replace(/\^/g, '**');

            // 4. Plotagem da curva por varredura de pixel
            ctx.strokeStyle = varPriorities = '#ff9900'; // Âmbar tático
            ctx.lineWidth = 2.5;
            ctx.shadowBlur = 4;
            ctx.shadowColor = '#ff9900';
            ctx.beginPath();

            let firstPoint = true;

            // Loop varrendo todos os pixels horizontais da tela (Resolução pixel a pixel)
            for (let pixelX = 0; pixelX < width; pixelX++) {
                // Converte a coordenada do pixel horizontal para o valor X real da matemática
                let x = (pixelX - centerX) / scale;
                let y;

                try {
                    // Executa a expressão injetando o valor de X atual no escopo dinâmico
                    let evalFunc = new Function('x', `return ${safeExpr};`);
                    y = evalFunc(x);

                    if (typeof y !== 'number' || isNaN(y) || !isFinite(y)) {
                        firstPoint = true; // Quebra a linha se o valor for inválido (ex: assíntotas)
                        continue;
                    }
                } catch (e) {
                    // Se a sintaxe estiver quebrada, interrompe o desenho do vetor
                    ctx.shadowBlur = 0;
                    alert("Erro no parse analítico da função. Verifique a sintaxe.");
                    return;
                }

                // Converte o resultado matemático Y de volta para a coordenada física de pixel na tela
                let pixelY = centerY - (y * scale);

                // Só desenha se estiver dentro dos limites verticais da tela de radar
                if (pixelY >= 0 && pixelY <= height) {
                    if (firstPoint) {
                        ctx.moveTo(pixelX, pixelY);
                        firstPoint = false;
                    } else {
                        ctx.lineTo(pixelX, pixelY);
                    }
                } else {
                    firstPoint = true; // Reseta conexão se sair da tela
                }
            }
            ctx.stroke();
            ctx.shadowBlur = 0; // Desliga o brilho para processos subsequentes
        }

        // Inicializa o vetor gráfico padrão na abertura do terminal
        plotGraph();
    </script>
</body>
</html>
