<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sombra - Criptografia Assimétrica</title>
    <style>
        :root {
            --bg-color: #0a0a0a;
            --text-color: #d4d4d4;
            --highlight: #ffffff;
            --border: #444444;
            --font-noir: 'Courier New', Courier, monospace;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: var(--font-noir);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-image: radial-gradient(circle, #1a1a1a 0%, #000000 100%);
            min-height: 100vh;
        }

        h1 {
            color: var(--highlight);
            text-transform: uppercase;
            letter-spacing: 5px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 10px;
            text-shadow: 2px 2px 4px #000;
        }

        .container {
            width: 100%;
            max-width: 800px;
            display: grid;
            gap: 20px;
        }

        .panel {
            background-color: rgba(0, 0, 0, 0.7);
            border: 1px solid var(--border);
            padding: 20px;
            box-shadow: inset 0 0 10px rgba(255,255,255,0.05), 5px 5px 15px rgba(0,0,0,0.8);
        }

        h2 {
            font-size: 1.2em;
            color: var(--highlight);
            margin-top: 0;
            border-left: 3px solid var(--highlight);
            padding-left: 10px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-size: 0.9em;
            color: #888;
        }

        textarea, input {
            width: 100%;
            background-color: #000;
            color: var(--highlight);
            border: 1px solid var(--border);
            padding: 10px;
            font-family: var(--font-noir);
            box-sizing: border-box;
            margin-bottom: 15px;
            resize: vertical;
        }

        textarea:focus, input:focus {
            outline: none;
            border-color: var(--highlight);
        }

        button {
            background-color: transparent;
            color: var(--highlight);
            border: 1px solid var(--highlight);
            padding: 10px 20px;
            font-family: var(--font-noir);
            cursor: pointer;
            text-transform: uppercase;
            transition: all 0.3s ease;
        }

        button:hover {
            background-color: var(--highlight);
            color: var(--bg-color);
        }

        .row {
            display: flex;
            gap: 10px;
        }

        .row > div {
            flex: 1;
        }

        .log {
            color: #a33;
            font-style: italic;
            min-height: 20px;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

    <h1>Protocolo Sombra</h1>
    
    <div class="container">
        <div class="panel">
            <h2>I. O Sinal (Gerar Chaves RSA)</h2>
            <p style="font-size: 0.85em; color: #888;">Gere um par de chaves matemáticas de 2048-bits. Entregue a Pública ao seu informante. Esconda a Privada onde ninguém possa encontrar.</p>
            <button onclick="generateKeys()">Gerar Novo Par de Chaves</button>
            <div id="key-log" class="log"></div>
            
            <div class="row">
                <div>
                    <label>Chave Pública (Para Criptografar - Pode Compartilhar)</label>
                    <textarea id="pub-key" rows="6" readonly></textarea>
                </div>
                <div>
                    <label>Chave Privada (Para Descriptografar - MANTER EM SEGREDO)</label>
                    <textarea id="priv-key" rows="6" readonly></textarea>
                </div>
            </div>
        </div>

        <div class="panel">
            <h2>II. O Disfarce (Criptografar)</h2>
            <label>Chave Pública do Destinatário</label>
            <textarea id="encrypt-key" rows="3" placeholder="Cole a chave pública aqui..."></textarea>
            
            <label>Mensagem em Texto Claro</label>
            <textarea id="encrypt-msg" rows="3" placeholder="A coruja canta à meia-noite..."></textarea>
            
            <button onclick="encryptMessage()">Ocultar Mensagem</button>
            <div id="enc-log" class="log"></div>
            
            <label>Mensagem Criptografada (Ciphertext)</label>
            <textarea id="encrypt-result" rows="4" readonly></textarea>
        </div>

        <div class="panel">
            <h2>III. A Revelação (Descriptografar)</h2>
            <label>Sua Chave Privada</label>
            <textarea id="decrypt-key" rows="3" placeholder="Cole sua chave privada aqui..."></textarea>
            
            <label>Mensagem Criptografada (Ciphertext)</label>
            <textarea id="decrypt-msg" rows="4" placeholder="Cole o texto oculto aqui..."></textarea>
            
            <button onclick="decryptMessage()">Revelar Verdade</button>
            <div id="dec-log" class="log"></div>
            
            <label>Mensagem Descriptografada</label>
            <textarea id="decrypt-result" rows="3" readonly></textarea>
        </div>
    </div>

    <script>
        // Funções utilitárias para conversão (ArrayBuffer <-> Base64)
        function arrayBufferToBase64(buffer) {
            let binary = '';
            let bytes = new Uint8Array(buffer);
            for (let i = 0; i < bytes.byteLength; i++) {
                binary += String.fromCharCode(bytes[i]);
            }
            return window.btoa(binary);
        }

        function base64ToArrayBuffer(base64) {
            let binary_string = window.atob(base64);
            let len = binary_string.length;
            let bytes = new Uint8Array(len);
            for (let i = 0; i < len; i++) {
                bytes[i] = binary_string.charCodeAt(i);
            }
            return bytes.buffer;
        }

        const algoParams = {
            name: "RSA-OAEP",
            modulusLength: 2048,
            publicExponent: new Uint8Array([1, 0, 1]),
            hash: "SHA-256"
        };

        // I. Gerar Chaves
        async function generateKeys() {
            try {
                document.getElementById('key-log').innerText = "Forjando chaves nas sombras...";
                const keyPair = await window.crypto.subtle.generateKey(
                    algoParams,
                    true,
                    ["encrypt", "decrypt"]
                );

                const publicKeyBuffer = await window.crypto.subtle.exportKey("spki", keyPair.publicKey);
                const privateKeyBuffer = await window.crypto.subtle.exportKey("pkcs8", keyPair.privateKey);

                document.getElementById('pub-key').value = arrayBufferToBase64(publicKeyBuffer);
                document.getElementById('priv-key').value = arrayBufferToBase64(privateKeyBuffer);
                document.getElementById('key-log').innerText = "Chaves geradas com sucesso.";
            } catch (error) {
                document.getElementById('key-log').innerText = "Erro: " + error.message;
            }
        }

        // II. Criptografar
        async function encryptMessage() {
            try {
                document.getElementById('enc-log').innerText = "";
                const pubKeyBase64 = document.getElementById('encrypt-key').value.trim();
                const message = document.getElementById('encrypt-msg').value;

                if (!pubKeyBase64 || !message) {
                    document.getElementById('enc-log').innerText = "Faltam peças do quebra-cabeça (chave ou mensagem).";
                    return;
                }

                // Importar chave pública
                const pubKeyBuffer = base64ToArrayBuffer(pubKeyBase64);
                const publicKey = await window.crypto.subtle.importKey(
                    "spki",
                    pubKeyBuffer,
                    { name: "RSA-OAEP", hash: "SHA-256" },
                    true,
                    ["encrypt"]
                );

                // Codificar e criptografar mensagem
                const enc = new TextEncoder();
                const encodedMessage = enc.encode(message);
                const encryptedBuffer = await window.crypto.subtle.encrypt(
                    { name: "RSA-OAEP" },
                    publicKey,
                    encodedMessage
                );

                document.getElementById('encrypt-result').value = arrayBufferToBase64(encryptedBuffer);
                document.getElementById('enc-log').innerText = "Mensagem selada no escuro.";
            } catch (error) {
                document.getElementById('enc-log').innerText = "A criptografia falhou. Verifique a chave.";
                console.error(error);
            }
        }

        // III. Descriptografar
        async function decryptMessage() {
            try {
                document.getElementById('dec-log').innerText = "";
                const privKeyBase64 = document.getElementById('decrypt-key').value.trim();
                const encryptedBase64 = document.getElementById('decrypt-msg').value.trim();

                if (!privKeyBase64 || !encryptedBase64) {
                    document.getElementById('dec-log').innerText = "Faltam peças do quebra-cabeça (chave ou cifra).";
                    return;
                }

                // Importar chave privada
                const privKeyBuffer = base64ToArrayBuffer(privKeyBase64);
                const privateKey = await window.crypto.subtle.importKey(
                    "pkcs8",
                    privKeyBuffer,
                    { name: "RSA-OAEP", hash: "SHA-256" },
                    true,
                    ["decrypt"]
                );

                // Descriptografar e decodificar mensagem
                const encryptedBuffer = base64ToArrayBuffer(encryptedBase64);
                const decryptedBuffer = await window.crypto.subtle.decrypt(
                    { name: "RSA-OAEP" },
                    privateKey,
                    encryptedBuffer
                );

                const dec = new TextDecoder();
                const decryptedMessage = dec.decode(decryptedBuffer);

                document.getElementById('decrypt-result').value = decryptedMessage;
                document.getElementById('dec-log').innerText = "O segredo foi revelado.";
            } catch (error) {
                document.getElementById('dec-log').innerText = "Aviso: A chave privada está incorreta ou os dados foram corrompidos.";
                console.error(error);
            }
        }
    </script>
</body>
</html>
