name: Build APK

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android/noir-release.jks

      - name: Create keystore.properties
        run: |
          cat > android/keystore.properties << EOF
          storePassword=${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword=${{ secrets.KEYSTORE_PASSWORD }}
          keyAlias=${{ secrets.KEYSTORE_ALIAS }}
          storeFile=noir-release.jks
          EOF

      - name: Create supabase-config.js
        run: |
          cat > supabase-config.js << EOF
          window.__SUPABASE_URL = '${{ secrets.SUPABASE_URL }}';
          window.__SUPABASE_ANON_KEY = '${{ secrets.SUPABASE_ANON_KEY }}';
          EOF

      - name: Build with Gradle
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleMarket

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-market-apk
          path: android/app/build/outputs/apk/market/*.apk