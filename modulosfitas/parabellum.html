<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Codinome: PARABELLUM</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=VT323&display=swap');

        :root {
            --phosphor: #d4a373; /* Tom sépia/âmbar noir */
            --bg: #0a0a0a;
        }

        body {
            background-color: var(--bg);
            color: var(--phosphor);
            font-family: 'VT323', monospace;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            height: 100vh;
            box-sizing: border-box;
            overflow: hidden;
        }

        /* Efeito CRT (Scanlines) */
        body::after {
            content: " ";
            display: block;
            position: absolute;
            top: 0;
            left: 0;
            bottom: 0;
            right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 2;
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
        }

        #terminal {
            width: 100%;
            max-width: 800px;
            display: flex;
            flex-direction: column;
            border: 1px solid var(--phosphor);
            padding: 20px;
            box-shadow: 0 0 10px rgba(212, 163, 115, 0.2);
            position: relative;
            z-index: 10;
            background: rgba(10, 10, 10, 0.9);
        }

        .header {
            text-align: center;
            border-bottom: 1px dashed var(--phosphor);
            padding-bottom: 10px;
            margin-bottom: 20px;
            letter-spacing: 2px;
        }

        #log {
            flex-grow: 1;
            overflow-y: auto;
            margin-bottom: 20px;
            padding-right: 10px;
            text-shadow: 0 0 5px var(--phosphor);
        }

        .msg-sys { color: #888; }
        .msg-in { color: #fefae0; }
        .msg-out { color: var(--phosphor); text-align: right; }

        .controls {
            display: flex;
            gap: 10px;
        }

        input[type="text"] {
            flex-grow: 1;
            background: transparent;
            border: 1px solid var(--phosphor);
            color: var(--phosphor);
            font-family: 'VT323', monospace;
            font-size: 1.2rem;
            padding: 10px;
            outline: none;
        }

        button {
            background: transparent;
            border: 1px solid var(--phosphor);
            color: var(--phosphor);
            font-family: 'VT323', monospace;
            font-size: 1.2rem;
            padding: 10px 20px;
            cursor: pointer;
            transition: all 0.2s;
            text-transform: uppercase;
        }

        button:hover {
            background: var(--phosphor);
            color: var(--bg);
        }

        #status-indicator {
            position: absolute;
            top: 20px;
            right: 20px;
            font-size: 0.9rem;
        }
        
        .blink { animation: blinker 1s linear infinite; }
        @keyframes blinker { 50% { opacity: 0; } }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: var(--phosphor); }
    </style>
</head>
<body>

    <div id="terminal">
        <div id="status-indicator">STATUS: <span id="status-text" class="blink">OFFLINE</span></div>
        <div class="header">
            <h2>PROJETO: PARABELLUM</h2>
            <p>CANAL ACÚSTICO ULTRASSÔNICO ESTABELECIDO - CRIPTOGRAFIA ATIVADA</p>
        </div>

        <div id="log">
            <div class="msg-sys">> INICIALIZANDO TERMINAL NOIR...</div>
            <div class="msg-sys">> AGUARDANDO AUTORIZAÇÃO DE HARDWARE (MICROFONE)...</div>
        </div>

        <div class="controls">
            <button id="btn-init">Iniciar Enlace Acústico</button>
            <input type="text" id="input-msg" placeholder="Digite a mensagem..." disabled autocomplete="off">
            <button id="btn-send" disabled>Transmitir</button>
        </div>
    </div>

    <script>
        // Configurações do Modem Acústico (Ultrassom)
        const FREQ_0 = 18000; // 18kHz representa o bit '0'
        const FREQ_1 = 18500; // 18.5kHz representa o bit '1'
        const FREQ_SYNC = 19000; // 19kHz representa sinal de sincronização/início
        const BAUD_RATE = 150; // ms por bit (Lento para garantir a detecção via FFT no navegador)
        const SECRET_KEY = "NOIR"; // Chave de criptografia simples

        let audioContext;
        let analyser;
        let isListening = false;

        const logEl = document.getElementById('log');
        const inputEl = document.getElementById('input-msg');
        const btnInit = document.getElementById('btn-init');
        const btnSend = document.getElementById('btn-send');
        const statusText = document.getElementById('status-text');

        function logMsg(msg, type = 'msg-sys') {
            const div = document.createElement('div');
            div.className = type;
            div.textContent = type === 'msg-sys' ? `> ${msg}` : msg;
            logEl.appendChild(div);
            logEl.scrollTop = logEl.scrollHeight;
        }

        // Criptografia Simples (XOR)
        function encryptDecrypt(input) {
            let output = '';
            for (let i = 0; i < input.length; i++) {
                output += String.fromCharCode(input.charCodeAt(i) ^ SECRET_KEY.charCodeAt(i % SECRET_KEY.length));
            }
            return output;
        }

        // Conversão Texto <-> Binário
        function textToBinary(text) {
            return text.split('').map(char => char.charCodeAt(0).toString(2).padStart(8, '0')).join('');
        }

        function binaryToText(binary) {
            let text = '';
            for (let i = 0; i < binary.length; i += 8) {
                text += String.fromCharCode(parseInt(binary.substring(i, i + 8), 2));
            }
            return text;
        }

        // Inicialização do Áudio
        async function initAudio() {
            try {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    audio: { echoCancellation: false, noiseSuppression: false, autoGainControl: false } 
                });
                
                const source = audioContext.createMediaStreamSource(stream);
                analyser = audioContext.createAnalyser();
                analyser.fftSize = 2048; // Alta resolução de frequência
                source.connect(analyser);

                isListening = true;
                btnInit.style.display = 'none';
                inputEl.disabled = false;
                btnSend.disabled = false;
                statusText.textContent = "ESCUTANDO (18kHz - 19kHz)";
                statusText.style.color = "#a7c957";
                
                logMsg("Enlace estabelecido. Escuta ativa nas frequências ultrassônicas.");
                listenLoop();
            } catch (err) {
                logMsg(`FALHA DE HARDWARE: ${err.message}. Verifique as permissões.`, 'msg-sys');
            }
        }

        // Transmissão (Gerador de Tons)
        function playTone(freq, duration) {
            return new Promise(resolve => {
                const oscillator = audioContext.createOscillator();
                oscillator.type = 'sine';
                oscillator.frequency.setValueAtTime(freq, audioContext.currentTime);
                oscillator.connect(audioContext.destination);
                oscillator.start();
                setTimeout(() => {
                    oscillator.stop();
                    resolve();
                }, duration);
            });
        }

        async function transmit(text) {
            btnSend.disabled = true;
            const encrypted = encryptDecrypt(text);
            const binary = textToBinary(encrypted);
            
            logMsg(`TX (Criptografado): ${encrypted}`, 'msg-out');
            statusText.textContent = "TRANSMITINDO...";

            // Envia sinal de SYNC para avisar o receptor
            await playTone(FREQ_SYNC, BAUD_RATE * 2);

            for (let i = 0; i < binary.length; i++) {
                const bit = binary[i];
                const freq = bit === '1' ? FREQ_1 : FREQ_0;
                await playTone(freq, BAUD_RATE);
            }

            // Fim da transmissão
            statusText.textContent = "ESCUTANDO (18kHz - 19kHz)";
            btnSend.disabled = false;
        }

        // Recepção (Análise de Espectro via FFT)
        let receivingBinary = '';
        let receiving = false;
        let lastBitTime = 0;

        function getFrequencyEnergy(targetFreq) {
            const bufferLength = analyser.frequencyBinCount;
            const dataArray = new Float32Array(bufferLength);
            analyser.getFloatFrequencyData(dataArray);
            
            const nyquist = audioContext.sampleRate / 2;
            const index = Math.round(targetFreq / nyquist * bufferLength);
            
            // Retorna decibéis (dB). Mais próximo de 0 é mais alto.
            return dataArray[index];
        }

        function listenLoop() {
            if (!isListening) return;

            const now = performance.now();
            const energySync = getFrequencyEnergy(FREQ_SYNC);
            const energy0 = getFrequencyEnergy(FREQ_0);
            const energy1 = getFrequencyEnergy(FREQ_1);
            
            const THRESHOLD = -60; // Limiar de detecção (dB). Ajuste dependendo do ruído.

            if (!receiving && energySync > THRESHOLD) {
                receiving = true;
                receivingBinary = '';
                lastBitTime = now;
                logMsg("Sinal portador detectado. Recebendo pacote...", "msg-sys");
            } 
            else if (receiving && (now - lastBitTime > BAUD_RATE)) {
                if (energy1 > THRESHOLD && energy1 > energy0) {
                    receivingBinary += '1';
                    lastBitTime = now;
                } else if (energy0 > THRESHOLD && energy0 > energy1) {
                    receivingBinary += '0';
                    lastBitTime = now;
                }

                // Condição de parada: silêncio prolongado
                if (energy1 <= THRESHOLD && energy0 <= THRESHOLD && energySync <= THRESHOLD && (now - lastBitTime > BAUD_RATE * 3)) {
                    receiving = false;
                    if (receivingBinary.length >= 8) {
                        try {
                            const encText = binaryToText(receivingBinary);
                            const decText = encryptDecrypt(encText);
                            logMsg(`RX (Descriptografado): ${decText}`, 'msg-in');
                        } catch (e) {
                            logMsg("Falha na decodificação do pacote.", 'msg-sys');
                        }
                    }
                    receivingBinary = '';
                }
            }

            requestAnimationFrame(listenLoop);
        }

        // Event Listeners
        btnInit.addEventListener('click', initAudio);
        
        btnSend.addEventListener('click', () => {
            if (inputEl.value.trim() !== '') {
                logMsg(`Você: ${inputEl.value}`, 'msg-out');
                transmit(inputEl.value);
                inputEl.value = '';
            }
        });

        inputEl.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') btnSend.click();
        });

    </script>
</body>
</html>
