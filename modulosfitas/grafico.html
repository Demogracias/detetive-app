<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>S.E.C.R.E.T. — Gerador de Gráficos Táticos V2</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2"></script>
<style>
:root {
  --bg:#0d0d0d; --panel:#161616; --input:#222;
  --text:#dcdcdc; --alert:#8b0000; --neon:#ff3333;
  --border:#333;
}
* { box-sizing:border-box; margin:0; padding:0; }
body {
  background:var(--bg); color:var(--text);
  font-family:'Courier New',Courier,monospace;
  padding:20px; min-height:100vh;
  background-image:radial-gradient(circle,#1a1a1a 1px,transparent 1px);
  background-size:20px 20px;
}
header {
  text-align:center; border-bottom:2px double var(--alert);
  padding-bottom:10px; margin-bottom:20px; max-width:1400px;
  margin-left:auto; margin-right:auto; position:relative;
}
header h1 { letter-spacing:4px; font-size:1.6rem; text-transform:uppercase; }
.stamp {
  position:absolute; top:5px; right:15px;
  border:3px solid var(--alert); color:var(--alert);
  padding:4px 8px; font-weight:bold; transform:rotate(5deg);
  text-transform:uppercase; font-size:0.7rem;
  box-shadow:0 0 5px rgba(139,0,0,0.5);
}
.main-container { display:flex; max-width:1400px; margin:0 auto; gap:20px; flex-wrap:wrap; }

.control-panel {
  flex:0 0 340px; background:var(--panel);
  border:1px solid var(--border); padding:18px;
  box-shadow:5px 5px 15px rgba(0,0,0,0.8);
  display:flex; flex-direction:column; gap:10px; max-height:calc(100vh - 140px); overflow-y:auto;
}
.control-panel::-webkit-scrollbar { width:4px; }
.control-panel::-webkit-scrollbar-thumb { background:var(--alert); }

.form-group { }
.form-group label { display:block; font-size:0.75rem; margin-bottom:3px; text-transform:uppercase; font-weight:bold; color:#aaa; }
.form-group input,.form-group select,.form-group textarea {
  width:100%; padding:7px 9px; background:var(--input);
  border:1px solid var(--border); color:#fff;
  font-family:'Courier New',Courier,monospace; font-size:0.8rem;
}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus {
  outline:none; border-color:var(--neon); box-shadow:0 0 5px rgba(255,51,51,0.3);
}
.form-group textarea { resize:vertical; min-height:40px; font-size:0.75rem; }
.form-hint { font-size:0.6rem; color:#555; margin-top:2px; }

.row { display:flex; gap:6px; align-items:center; }
.row > * { flex:1; }

.btn {
  padding:8px 12px; background:var(--alert); color:#fff; border:none;
  font-family:'Courier New',Courier,monospace; font-weight:bold;
  font-size:0.8rem; cursor:pointer; text-transform:uppercase;
  letter-spacing:1px; transition:all 0.3s; text-align:center;
}
.btn:hover { background:#b30000; box-shadow:0 0 8px var(--neon); }
.btn-sm { padding:5px 8px; font-size:0.65rem; }
.btn-outline { background:transparent; border:1px solid var(--border); color:var(--text); }
.btn-outline:hover { background:var(--input); border-color:var(--text); }
.btn-green { background:#006600; }
.btn-green:hover { background:#008800; box-shadow:0 0 8px #00ff00; }
.btn-blue { background:#003366; }
.btn-blue:hover { background:#004488; box-shadow:0 0 8px #3388ff; }

.vis-panel {
  flex:1; min-width:480px; background:var(--panel);
  border:1px solid var(--border); padding:18px;
  box-shadow:5px 5px 15px rgba(0,0,0,0.8);
  display:flex; flex-direction:column;
}
.canvas-wrap { position:relative; width:100%; flex:1; min-height:350px; }
.canvas-wrap canvas { width:100% !important; height:100% !important; }

.dataset-card {
  background:rgba(255,255,255,0.03); border:1px solid var(--border);
  padding:8px; margin-bottom:6px; border-left:3px solid var(--neon);
}
.dataset-card .card-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:4px; }
.dataset-card .card-header span { font-size:0.7rem; font-weight:bold; }
.dataset-card input { width:100%; padding:4px 6px; background:var(--input); border:1px solid var(--border); color:#fff; font-size:0.7rem; font-family:inherit; }

.color-dot { display:inline-block; width:12px; height:12px; border-radius:50%; vertical-align:middle; margin-right:4px; border:1px solid #555; }
.color-picker-row { display:flex; align-items:center; gap:6px; }
.color-picker-row input[type="color"] { width:32px; height:24px; padding:0; border:none; background:transparent; cursor:pointer; }
.color-picker-row input[type="text"] { flex:1; min-width:0; }

.table-view { width:100%; border-collapse:collapse; font-size:0.7rem; margin-top:6px; }
.table-view th,.table-view td { border:1px solid var(--border); padding:3px 5px; text-align:center; }
.table-view th { background:var(--input); color:#aaa; font-size:0.6rem; text-transform:uppercase; }
.table-view td:focus-within { border-color:var(--neon); }
.table-view input { width:100%; border:none; background:transparent; color:#fff; text-align:center; font-size:0.7rem; font-family:inherit; }
.table-view input:focus { outline:none; }

.option-row { display:flex; gap:8px; flex-wrap:wrap; align-items:center; }
.option-row label { display:flex; align-items:center; gap:4px; font-size:0.65rem; color:#aaa; cursor:pointer; }
.option-row input[type="checkbox"] { accent-color:var(--neon); }

.tabs { display:flex; gap:2px; margin-bottom:4px; }
.tab-btn { padding:4px 10px; font-size:0.6rem; background:transparent; border:1px solid var(--border); color:#666; cursor:pointer; font-family:inherit; text-transform:uppercase; }
.tab-btn.active { border-color:var(--neon); color:var(--neon); background:rgba(139,0,0,0.15); }
.tab-content { display:none; }
.tab-content.active { display:block; }

.export-bar { display:flex; gap:6px; margin-top:8px; justify-content:flex-end; }

@media (max-width:800px) {
  .control-panel { flex:1; max-height:none; }
  .vis-panel { min-width:auto; }
}
</style>
</head>
<body>

<header>
  <div class="stamp">Top Secret</div>
  <h1>Departamento de Análise Tática V2</h1>
  <p style="color:#666;font-size:0.75rem;">CHART.JS 4 — MÚLTIPLOS DATASETS · EXPORT · CSV · AUTO-SAVE</p>
</header>

<div class="main-container">

  <!-- CONTROLE -->
  <section class="control-panel" id="controlPanel">

    <!-- Tipo -->
    <div class="form-group">
      <label>Tipo de Gráfico</label>
      <select id="chartType">
        <optgroup label="Comparativos">
          <option value="bar">Barras (Vertical)</option>
          <option value="bar-h">Barras (Horizontal)</option>
          <option value="stacked">Barras Empilhadas</option>
          <option value="stacked-h">Barras Empilhadas (Horizontal)</option>
        </optgroup>
        <optgroup label="Tendência">
          <option value="line">Linha</option>
          <option value="line-step">Linha (Escada)</option>
          <option value="line-smooth">Linha (Suavizada)</option>
        </optgroup>
        <optgroup label="Proporção">
          <option value="pie">Pizza</option>
          <option value="doughnut">Rosca</option>
          <option value="polarArea">Área Polar</option>
        </optgroup>
        <optgroup label="Multivariado">
          <option value="radar">Radar</option>
          <option value="scatter">Dispersão (XY)</option>
          <option value="bubble">Bolha</option>
        </optgroup>
        <optgroup label="Composto">
          <option value="mixed">Misto (Bar + Linha)</option>
        </optgroup>
      </select>
    </div>

    <!-- Título -->
    <div class="row">
      <div class="form-group" style="flex:2">
        <label>Título</label>
        <input type="text" id="chartTitle" value="Operação Shadow">
      </div>
      <div class="form-group" style="flex:1">
        <label>Fonte</label>
        <input type="text" id="chartSource" value="Inteligência Interna">
      </div>
    </div>

    <!-- Rótulos -->
    <div class="form-group">
      <label>Rótulos (vírgula)</label>
      <textarea id="chartLabels">Jan, Fev, Mar, Abr, Mai, Jun</textarea>
    </div>

    <!-- DATASETS -->
    <div style="display:flex;justify-content:space-between;align-items:center;">
      <label style="font-size:0.75rem;font-weight:bold;color:#aaa;text-transform:uppercase;">Datasets</label>
      <button class="btn btn-sm btn-outline" onclick="addDataset()">+ NOVO</button>
    </div>
    <div id="datasetsContainer"></div>

    <!-- Abas: Opções / Tabela / CSV -->
    <div class="tabs">
      <button class="tab-btn active" data-tab="tab-options" onclick="switchTab(this)">Opções</button>
      <button class="tab-btn" data-tab="tab-table" onclick="switchTab(this)">Tabela</button>
      <button class="tab-btn" data-tab="tab-csv" onclick="switchTab(this)">CSV</button>
    </div>

    <div id="tab-options" class="tab-content active">
      <div class="option-row">
        <label><input type="checkbox" id="optLegend" checked> Legenda</label>
        <label><input type="checkbox" id="optGrid" checked> Grade</label>
        <label><input type="checkbox" id="optFill" checked> Preenchimento</label>
        <label><input type="checkbox" id="optAnimation" checked> Animação</label>
        <label><input type="checkbox" id="optDataLabels"> Rótulos nos dados</label>
      </div>
      <div class="row" style="margin-top:4px;">
        <div class="form-group">
          <label>Eixo X</label>
          <input type="text" id="axisX" value="Período">
        </div>
        <div class="form-group">
          <label>Eixo Y</label>
          <input type="text" id="axisY" value="Valor">
        </div>
      </div>
      <div class="row">
        <div class="form-group">
          <label>Min Y</label>
          <input type="number" id="axisYMin" placeholder="auto">
        </div>
        <div class="form-group">
          <label>Max Y</label>
          <input type="number" id="axisYMax" placeholder="auto">
        </div>
        <div class="form-group">
          <label>Passo Y</label>
          <input type="number" id="axisYStep" placeholder="auto">
        </div>
      </div>
    </div>

    <div id="tab-table" class="tab-content">
      <div style="overflow-x:auto;max-height:200px;overflow-y:auto;" id="tableContainer"></div>
      <div class="form-hint">Edite os valores diretamente na tabela.</div>
    </div>

    <div id="tab-csv" class="tab-content">
      <div class="form-group">
        <label>Importar CSV (separado por vírgula)</label>
        <textarea id="csvInput" rows="3" style="font-size:0.65rem;" placeholder="Colar dados CSV aqui&#10;Rótulo1,Rótulo2,Rótulo3&#10;10,20,30"> </textarea>
      </div>
      <div class="row">
        <button class="btn btn-sm btn-green" onclick="importCSV()">Importar CSV</button>
        <button class="btn btn-sm btn-blue" onclick="exportCSV()">Exportar CSV</button>
      </div>
    </div>

    <button class="btn" onclick="compile()">COMPILAR RELATÓRIO</button>
    <div class="export-bar">
      <button class="btn btn-sm btn-blue" onclick="exportPNG()">⬇ PNG</button>
      <button class="btn btn-sm btn-blue" onclick="exportCSVonly()">⬇ CSV</button>
    </div>
  </section>

  <!-- VISUALIZAÇÃO -->
  <section class="vis-panel">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
      <span id="chartLabel" style="font-size:0.7rem;color:#666;">Operação Shadow</span>
      <div style="display:flex;gap:4px;">
        <button class="btn btn-sm btn-outline" onclick="copyChart()" title="Copiar como imagem">📋</button>
        <button class="btn btn-sm btn-outline" onclick="toggleFullscreen()" title="Tela cheia">⛶</button>
      </div>
    </div>
    <div class="canvas-wrap">
      <canvas id="noirChart"></canvas>
    </div>
    <div id="chartFooter" style="font-size:0.6rem;color:#444;text-align:right;margin-top:4px;"></div>
  </section>

</div>

<script>
// ================================================================
// ESTADO
// ================================================================
let chartInstance = null;
let datasets = [];

// Paletas pré-definidas
const PALETTE = [
  '#ff3333','#3388ff','#22cc44','#ffaa00','#cc44ff','#00dddd','#ff66aa',
  '#88ff44','#dd8800','#4488ff','#ff4488','#00cc88','#8844ff','#ff8833'
];

function initState() { addDataset(); addDataset(); }
function randomColor(i) { return PALETTE[i % PALETTE.length]; }

// ================================================================
// DATASETS
// ================================================================
function addDataset() {
  const i = datasets.length;
  const color = randomColor(i);
  datasets.push({
    id: Date.now() + '_' + i,
    label: 'Série ' + (i + 1),
    color: color,
    values: [0,0,0,0,0,0],
    hidden: false
  });
  renderDatasets();
  if (chartInstance) compile();
}

function removeDataset(id) {
  if (datasets.length <= 1) return;
  datasets = datasets.filter(d => d.id !== id);
  renderDatasets();
  if (chartInstance) compile();
}

function renderDatasets() {
  const c = document.getElementById('datasetsContainer');
  c.innerHTML = '';
  const labels = getLabels();
  datasets.forEach((d, idx) => {
    // Ajusta tamanho do array de valores
    while (d.values.length < labels.length) d.values.push(0);
    if (d.values.length > labels.length) d.values = d.values.slice(0, labels.length);

    const card = document.createElement('div');
    card.className = 'dataset-card';
    card.style.borderLeftColor = d.color;
    card.innerHTML = `
      <div class="card-header">
        <span style="color:${d.color}"><span class="color-dot" style="background:${d.color}"></span>${d.label}</span>
        <div>
          <button class="btn btn-sm btn-outline" style="font-size:0.55rem;padding:2px 5px;" onclick="moveDataset(${idx},-1)" ${idx===0?'disabled':''}>▲</button>
          <button class="btn btn-sm btn-outline" style="font-size:0.55rem;padding:2px 5px;" onclick="moveDataset(${idx},1)" ${idx===datasets.length-1?'disabled':''}>▼</button>
          <button class="btn btn-sm btn-outline" style="font-size:0.55rem;padding:2px 5px;color:var(--alert);" onclick="removeDataset('${d.id}')" ${datasets.length<=1?'disabled':''}>✕</button>
        </div>
      </div>
      <div class="row">
        <div class="color-picker-row" style="flex:1">
          <input type="color" value="${d.color}" onchange="updateDatasetColor('${d.id}',this.value)">
          <input type="text" value="${d.label}" onchange="updateDatasetLabel('${d.id}',this.value)" placeholder="Nome">
        </div>
      </div>
      <div class="row" style="margin-top:3px;">
        <div class="form-group" style="margin:0;">
          <label style="font-size:0.55rem;">Valores (vírgula)</label>
          <input type="text" value="${d.values.join(', ')}" onchange="updateDatasetValues('${d.id}',this.value)" style="font-size:0.65rem;padding:3px 5px;">
        </div>
      </div>
    `;
    c.appendChild(card);
  });
  renderTable();
}

function moveDataset(idx, dir) {
  const newIdx = idx + dir;
  if (newIdx < 0 || newIdx >= datasets.length) return;
  [datasets[idx], datasets[newIdx]] = [datasets[newIdx], datasets[idx]];
  renderDatasets();
  if (chartInstance) compile();
}

function updateDatasetColor(id, color) {
  const d = datasets.find(ds => ds.id === id);
  if (d) { d.color = color; renderDatasets(); if (chartInstance) compile(); }
}

function updateDatasetLabel(id, label) {
  const d = datasets.find(ds => ds.id === id);
  if (d) { d.label = label; renderDatasets(); if (chartInstance) compile(); }
}

function updateDatasetValues(id, str) {
  const d = datasets.find(ds => ds.id === id);
  if (!d) return;
  d.values = str.split(',').map(s => parseFloat(s.trim()) || 0);
  // Ajusta ao número de labels
  const labels = getLabels();
  while (d.values.length < labels.length) d.values.push(0);
  if (d.values.length > labels.length) d.values = d.values.slice(0, labels.length);
  if (chartInstance) compile();
}

// ================================================================
// LABELS
// ================================================================
function getLabels() {
  return document.getElementById('chartLabels').value.split(',').map(s => s.trim()).filter(Boolean);
}

// ================================================================
// TABELA EDITÁVEL
// ================================================================
function renderTable() {
  const container = document.getElementById('tableContainer');
  const labels = getLabels();
  let html = '<table class="table-view"><thead><tr><th></th>';
  labels.forEach(l => { html += `<th>${l}</th>`; });
  html += '</tr></thead><tbody>';
  datasets.forEach((d, di) => {
    html += `<tr><td style="font-weight:bold;color:${d.color};font-size:0.6rem;">${d.label}</td>`;
    for (let i = 0; i < labels.length; i++) {
      const val = d.values[i] !== undefined ? d.values[i] : 0;
      html += `<td><input type="number" step="any" value="${val}" data-ds="${di}" data-idx="${i}" onchange="tableEdit(${di},${i},this.value)"></td>`;
    }
    html += '</tr>';
  });
  html += '</tbody></table>';
  container.innerHTML = html;
}

function tableEdit(dsIdx, valIdx, value) {
  datasets[dsIdx].values[valIdx] = parseFloat(value) || 0;
  if (chartInstance) compile();
}

// ================================================================
// ABAS
// ================================================================
function switchTab(btn) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById(btn.dataset.tab).classList.add('active');
  renderTable();
}

// ================================================================
// CSV IMPORT / EXPORT
// ================================================================
function importCSV() {
  const raw = document.getElementById('csvInput').value.trim();
  if (!raw) return;
  const lines = raw.split('\n').map(l => l.trim()).filter(Boolean);
  if (lines.length < 1) return;

  // Primeira linha = labels
  const labels = lines[0].split(',').map(s => s.trim()).filter(Boolean);
  if (labels.length < 2) { alert('CSV precisa de ao menos 2 colunas.'); return; }
  document.getElementById('chartLabels').value = labels.join(', ');

  // Demais linhas = datasets
  datasets = [];
  for (let i = 1; i < lines.length; i++) {
    const cols = lines[i].split(',').map(s => s.trim());
    const name = cols[0] || ('Série ' + i);
    const vals = cols.slice(1).map(v => parseFloat(v) || 0);
    while (vals.length < labels.length) vals.push(0);
    datasets.push({ id: Date.now() + '_' + i, label: name, color: randomColor(datasets.length), values: vals.slice(0, labels.length), hidden: false });
  }
  if (datasets.length === 0) addDataset();
  renderDatasets();
  compile();
  writeLog('CSV importado: ' + labels.length + ' colunas, ' + datasets.length + ' séries.');
}

function exportCSV() {
  const labels = getLabels();
  let csv = 'Série,' + labels.join(',') + '\n';
  datasets.forEach(d => {
    csv += d.label + ',' + d.values.join(',') + '\n';
  });
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href = url; a.download = 'dados_secretos.csv'; a.click();
  URL.revokeObjectURL(url);
}

function exportCSVonly() { exportCSV(); }

// ================================================================
// MAIN COMPILE
// ================================================================
function compile() {
  const ctx = document.getElementById('noirChart').getContext('2d');
  const type = document.getElementById('chartType').value;
  const title = document.getElementById('chartTitle').value || 'Dados';
  const source = document.getElementById('chartSource').value || '';
  const labels = getLabels();
  const axisX = document.getElementById('axisX').value || '';
  const axisY = document.getElementById('axisY').value || '';

  if (labels.length === 0) return;

  // Destrói anterior
  if (chartInstance) { chartInstance.destroy(); chartInstance = null; }

  // Data
  const chartData = { labels, datasets: [] };
  const isPie = ['pie','doughnut','polarArea'].includes(type);
  const isScatter = type === 'scatter' || type === 'bubble';

  datasets.forEach((d, idx) => {
    const ds = {
      label: d.label,
      data: isScatter ? d.values.map((v, i) => ({ x: i + 1, y: v })) : d.values,
      borderColor: d.color,
      backgroundColor: isPie ? d.color : d.color + '33',
      pointBackgroundColor: d.color,
      pointBorderColor: '#fff',
      pointHoverBackgroundColor: '#fff',
      pointHoverBorderColor: d.color,
      borderWidth: 2,
      fill: document.getElementById('optFill').checked && !isPie,
      tension: type === 'line-smooth' ? 0.4 : (type === 'line-step' ? 0 : undefined),
      stepped: type === 'line-step' ? 'before' : undefined,
      hidden: d.hidden
    };
    if (type === 'mixed') {
      if (idx === 1) { ds.type = 'line'; ds.borderColor = d.color; ds.backgroundColor = 'transparent'; }
    }
    if (isPie) {
      ds.backgroundColor = datasets.map((dd, i) => randomColor(i));
      ds.borderColor = '#161616';
      ds.borderWidth = 2;
    }
    chartData.datasets.push(ds);
  });

  // Determina tipo real do Chart.js
  let chartType = type;
  const typeMap = {
    'bar-h': 'bar', 'stacked': 'bar', 'stacked-h': 'bar',
    'line-step': 'line', 'line-smooth': 'line',
    'mixed': 'bar'
  };
  if (typeMap[chartType]) chartType = typeMap[chartType];
  if (isPie) chartType = type;

  // Options
  const optLegend = document.getElementById('optLegend').checked;
  const optGrid = document.getElementById('optGrid').checked;
  const optAnim = document.getElementById('optAnimation').checked;
  const optDL = document.getElementById('optDataLabels').checked;
  const yMin = parseFloat(document.getElementById('axisYMin').value);
  const yMax = parseFloat(document.getElementById('axisYMax').value);
  const yStep = parseFloat(document.getElementById('axisYStep').value);

  const options = {
    responsive: true,
    maintainAspectRatio: false,
    animation: optAnim ? { duration: 600 } : false,
    plugins: {
      legend: { display: optLegend, labels: { color: '#eee', font: { family: 'Courier New', size: 11, weight: 'bold' } } },
      tooltip: { backgroundColor: '#0d0d0d', titleFont: { family: 'Courier New' }, bodyFont: { family: 'Courier New' }, borderColor: '#8b0000', borderWidth: 1 }
    }
  };

  if (optDL && ChartDataLabels) {
    options.plugins.datalabels = {
      color: '#fff', font: { family: 'Courier New', size: 10, weight: 'bold' },
      anchor: isPie ? 'end' : 'end', align: isPie ? 'end' : 'end',
      formatter: v => v || ''
    };
  }

  if (!isPie && type !== 'polarArea' && type !== 'radar') {
    options.scales = {
      x: {
        title: { display: !!axisX, text: axisX, color: '#aaa', font: { family: 'Courier New', size: 11 } },
        grid: { color: optGrid ? '#252525' : 'transparent' },
        ticks: { color: '#aaa', font: { family: 'Courier New', size: 11 } }
      },
      y: {
        title: { display: !!axisY, text: axisY, color: '#aaa', font: { family: 'Courier New', size: 11 } },
        grid: { color: optGrid ? '#252525' : 'transparent' },
        ticks: { color: '#aaa', font: { family: 'Courier New', size: 11 }, stepSize: yStep || undefined },
        min: isNaN(yMin) ? undefined : yMin,
        max: isNaN(yMax) ? undefined : yMax
      }
    };
    if (type === 'bar-h') { options.indexAxis = 'y'; }
    if (type === 'stacked' || type === 'stacked-h') {
      options.scales.x.stacked = true;
      options.scales.y.stacked = true;
      if (type === 'stacked-h') options.indexAxis = 'y';
    }
  }

  if (type === 'radar') {
    options.scales = {
      r: {
        grid: { color: optGrid ? '#333' : 'transparent' },
        angleLines: { color: '#333' },
        pointLabels: { color: '#aaa', font: { family: 'Courier New', size: 11 } },
        ticks: { backdropColor: 'transparent', color: '#666', stepSize: yStep || undefined },
        min: isNaN(yMin) ? undefined : yMin,
        max: isNaN(yMax) ? undefined : yMax
      }
    };
  }

  // Cria
  chartInstance = new Chart(ctx, { type: chartType, data: chartData, options });

  // Atualiza label
  document.getElementById('chartLabel').textContent = title + (source ? ' — ' + source : '');
  const now = new Date().toLocaleString();
  document.getElementById('chartFooter').textContent = 'Compilado em ' + now + ' | ' + labels.length + ' pontos · ' + datasets.length + ' séries';

  // Auto-save
  saveToLocalStorage();
}

// ================================================================
// EXPORT PNG / CÓPIA
// ================================================================
function exportPNG() {
  if (!chartInstance) return;
  const url = chartInstance.toBase64Image('image/png', 1);
  const a = document.createElement('a'); a.href = url;
  const title = document.getElementById('chartTitle').value || 'grafico';
  a.download = title.replace(/[^a-z0-9]/gi,'_').toLowerCase() + '.png';
  a.click();
}

function copyChart() {
  if (!chartInstance) return;
  const url = chartInstance.toBase64Image('image/png', 1);
  fetch(url).then(r => r.blob()).then(blob => {
    navigator.clipboard.write([new ClipboardItem({ 'image/png': blob })]);
  }).catch(() => {
    const a = document.createElement('a'); a.href = url; a.download = 'chart.png'; a.click();
  });
}

function toggleFullscreen() {
  const el = document.querySelector('.vis-panel');
  if (!document.fullscreenElement) el.requestFullscreen();
  else document.exitFullscreen();
}

// ================================================================
// AUTO-SAVE (localStorage)
// ================================================================
const SAVE_KEY = 'secret_chart_v2';

function saveToLocalStorage() {
  try {
    const state = {
      type: document.getElementById('chartType').value,
      title: document.getElementById('chartTitle').value,
      source: document.getElementById('chartSource').value,
      labels: document.getElementById('chartLabels').value,
      axisX: document.getElementById('axisX').value,
      axisY: document.getElementById('axisY').value,
      yMin: document.getElementById('axisYMin').value,
      yMax: document.getElementById('axisYMax').value,
      yStep: document.getElementById('axisYStep').value,
      datasets: datasets.map(d => ({ label: d.label, color: d.color, values: d.values })),
      opts: {
        legend: document.getElementById('optLegend').checked,
        grid: document.getElementById('optGrid').checked,
        fill: document.getElementById('optFill').checked,
        anim: document.getElementById('optAnimation').checked,
        dl: document.getElementById('optDataLabels').checked
      }
    };
    localStorage.setItem(SAVE_KEY, JSON.stringify(state));
  } catch (e) {}
}

function loadFromLocalStorage() {
  try {
    const raw = localStorage.getItem(SAVE_KEY);
    if (!raw) return false;
    const s = JSON.parse(raw);
    document.getElementById('chartType').value = s.type || 'line';
    document.getElementById('chartTitle').value = s.title || 'Operação Shadow';
    document.getElementById('chartSource').value = s.source || '';
    document.getElementById('chartLabels').value = s.labels || 'Jan, Fev, Mar, Abr, Mai, Jun';
    document.getElementById('axisX').value = s.axisX || '';
    document.getElementById('axisY').value = s.axisY || '';
    document.getElementById('axisYMin').value = s.yMin || '';
    document.getElementById('axisYMax').value = s.yMax || '';
    document.getElementById('axisYStep').value = s.yStep || '';
    if (s.datasets && s.datasets.length > 0) {
      datasets = s.datasets.map(d => ({ id: Date.now() + '_' + Math.random(), ...d }));
    } else {
      initState();
    }
    if (s.opts) {
      document.getElementById('optLegend').checked = s.opts.legend !== false;
      document.getElementById('optGrid').checked = s.opts.grid !== false;
      document.getElementById('optFill').checked = s.opts.fill !== false;
      document.getElementById('optAnimation').checked = s.opts.anim !== false;
      document.getElementById('optDataLabels').checked = s.opts.dl === true;
    }
    return true;
  } catch (e) { return false; }
}

function writeLog(msg) {
  const footer = document.getElementById('chartFooter');
  footer.textContent = msg + ' | ' + new Date().toLocaleString();
}

// ================================================================
// EVENTOS
// ================================================================
document.getElementById('chartLabels').addEventListener('input', () => {
  renderDatasets();
  if (chartInstance) compile();
});

// Tecla Enter no CSV
document.getElementById('csvInput').addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && e.ctrlKey) importCSV();
});

// ================================================================
// INIT
// ================================================================
if (!loadFromLocalStorage()) initState();
renderDatasets();
compile();
</script>
</body>
